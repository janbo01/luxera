name: Deploy Luxera

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        env:
          PUBLIC_STORE_API: ${{ vars.PUBLIC_STORE_API }}
          PUBLIC_PRODUCT_API: ${{ vars.PUBLIC_PRODUCT_API }}
          PUBLIC_USER_API: ${{ vars.PUBLIC_USER_API }}
          PUBLIC_ORDER_API: ${{ vars.PUBLIC_ORDER_API }}
          PUBLIC_PAYMENT_API: ${{ vars.PUBLIC_PAYMENT_API }}
        run: |
          docker build \
            --build-arg PUBLIC_STORE_API="$PUBLIC_STORE_API" \
            --build-arg PUBLIC_PRODUCT_API="$PUBLIC_PRODUCT_API" \
            --build-arg PUBLIC_USER_API="$PUBLIC_USER_API" \
            --build-arg PUBLIC_ORDER_API="$PUBLIC_ORDER_API" \
            --build-arg PUBLIC_PAYMENT_API="$PUBLIC_PAYMENT_API" \
            -t core-era/luxera:latest .

      - name: Transfer image to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts
          docker save core-era/luxera:latest | gzip | ssh ${VPS_USER}@${VPS_HOST} "docker load"

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh ${VPS_USER}@${VPS_HOST} bash << 'ENDSSH'
            docker stop luxera 2>/dev/null || true
            docker rm luxera 2>/dev/null || true
            docker run -d \
              --name luxera \
              --restart unless-stopped \
              --network core-era \
              -p 8090:3000 \
              -e NODE_ENV=production \
              -e STORE_API=http://store:8084 \
              -e PRODUCT_API=http://product:8081 \
              core-era/luxera:latest
          ENDSSH

      - name: Smoke test
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          for i in $(seq 1 15); do
            ssh ${VPS_USER}@${VPS_HOST} "curl -sf http://localhost:8090/" && echo "Service is up" && exit 0
            echo "Waiting... ($i/15)"
            sleep 4
          done
          ssh ${VPS_USER}@${VPS_HOST} "docker logs luxera --tail=50"
          exit 1

      - name: Prune old images
        if: always()
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          docker image prune -f
          ssh ${VPS_USER}@${VPS_HOST} "docker image prune -f"
