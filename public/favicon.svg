<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3D2218"/>
      <stop offset="100%" stop-color="#1E0E08"/>
    </linearGradient>
    <linearGradient id="g" x1="7" y1="2" x2="25" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F2C49A"/>
      <stop offset="30%"  stop-color="#E09050"/>
      <stop offset="65%"  stop-color="#C07030"/>
      <stop offset="100%" stop-color="#8A3E14"/>
    </linearGradient>
    <linearGradient id="gs" x1="7" y1="2" x2="25" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F2C49A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8A3E14" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Crystal body fill (subtle — aids legibility at 16px) -->
  <path d="M16,2 L10,8 L7,16 L10,24 L16,30 L22,24 L25,16 L22,8 Z"
        fill="#C4783A" fill-opacity="0.15"/>

  <!-- Crystal outline -->
  <path d="M16,2 L10,8 L7,16 L10,24 L16,30 L22,24 L25,16 L22,8 Z"
        stroke="url(#g)" stroke-width="1.35" stroke-linejoin="round" fill="none"/>

  <!-- Primary structural lines -->
  <line x1="16" y1="2"  x2="7"  y2="16" stroke="url(#g)"  stroke-width="1.05"/>
  <line x1="16" y1="2"  x2="25" y2="16" stroke="url(#g)"  stroke-width="1.05"/>
  <line x1="7"  y1="16" x2="25" y2="16" stroke="url(#g)"  stroke-width="1.05"/>
  <line x1="16" y1="30" x2="7"  y2="16" stroke="url(#g)"  stroke-width="1.05"/>
  <line x1="16" y1="30" x2="25" y2="16" stroke="url(#g)"  stroke-width="1.05"/>

  <!-- Secondary facet lines -->
  <line x1="10" y1="8"  x2="22" y2="8"  stroke="url(#gs)" stroke-width="0.85"/>
  <line x1="10" y1="24" x2="22" y2="24" stroke="url(#gs)" stroke-width="0.85"/>
</svg>
